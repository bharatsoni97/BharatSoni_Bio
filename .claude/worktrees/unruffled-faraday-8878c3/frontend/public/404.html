<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bharat Soni</title>
    <script>
      // GitHub Pages SPA redirect: encode the path into the query string so
      // index.html can restore it via history.replaceState after load.
      // segmentCount = 1 because the repo is deployed at /BharatSoni_Bio/
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
